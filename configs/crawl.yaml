# 爬虫配置
# 上市公司研发资本化风险排序与问询函可行性测试

# 巨潮资讯网 API 基础配置
cninfo:
  base_url: "http://www.cninfo.com.cn/new/information"
  # 年报公告类型
  category_rsg:
    column: "sse"  # 由代码动态选择 szse / shse / bjse
    plate: "sh"    # 由代码动态选择 sz / sh / bj
    tabName: "fulltext"
    pageNum: 1
    pageSize: 30
  # 问询函公告类型
  category_dshgszz:
    column: "sse"
    plate: "sh"
    tabName: "fulltext"
    pageNum: 1
    pageSize: 30

# 深证信官方 API 配置（experiment/cninfo-official-api 分支）
# 需要 .env 中配置 CNINFO_ACCESS_KEY / CNINFO_ACCESS_SECRET
cninfo_official_api:
  # 是否启用（main.py 中通过 --crawl-backend official 显式选择）
  enabled: false
  # 请求间隔（秒）
  delay_seconds: 3
  # 最大重试次数
  max_retries: 3
  # p_info3015 分页大小
  page_size: 100
  # 最大允许失败率，超过则自动熔断
  max_failure_rate: 0.15
  # token 缓存路径（相对于项目根目录，不提交）
  token_cache_path: "data/cninfo_official_token.json"

